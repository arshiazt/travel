{% load static %}
<!doctype html>
<html lang="en">

<head>
	<title>Sign Up</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

	<link href="https://fonts.googleapis.com/css?family=Lato:300,400,700&display=swap" rel="stylesheet">

	<link rel="stylesheet"
		href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/{% static 'signup/css/font-awesome.min.css' %}">

	<link rel="stylesheet" href="{% static 'signup/css/style.css' %}">

</head>

<body>
	<section class="ftco-section">
		<div class="container">
			<div class="row justify-content-center">
				<div class="col-md-6 text-center mb-5">
					<h2 class="heading-section">Sign Up</h2>
				</div>
			</div>
			<div class="row justify-content-center">
				<div class="col-md-7 col-lg-6 col-xl-5">
					<div class="login-wrap p-4 p-md-5">
						<div class="icon d-flex align-items-center justify-content-center">
							<span class="fa fa-edit"></span>
						</div>
						<h3 class="text-center mb-4">Create Your Account</h3>
						<form action="{% url 'accounts:signup' %}" method="post" class="signup-form">
							{% csrf_token %}
							<div class="form-group mb-3">
								<label class="label">Username</label>
								<input type="text" name="username" class="form-control" placeholder="John Doe">
							</div>
							<div class="form-group mb-3">
								<label class="label">Password</label>
								<input type="password" name="password1" class="form-control" placeholder="Password">
							</div>
							<div class="form-group mb-3">
								<label class="label">Confirm Password</label>
								<input type="password" name="password2" class="form-control" placeholder="Confirm Password">
								<span toggle="#password-field"
									class="fa fa-fw fa-eye field-icon toggle-password"></span>
							</div>
							
							<div class="form-group">
								<button type="submit" class="form-control btn btn-primary rounded submit px-3">Sign Up</button>
							</div>
						</form>
						<p>I'm already a member! <a href="{% url 'accounts:login' %}">Login</a></p>
					</div>
				</div>
			</div>
		</div>
	</section>

	<script src="{% static 'signup/js/jquery.min.js' %}"></script>
	<script src="{% static 'signup/js/popper.js' %}"></script>
	<script src="{% static 'signup/js/bootstrap.min.js' %}"></script>
	<script src="{% static 'signup/js/main.js' %}"></script>

</body>

</html>
